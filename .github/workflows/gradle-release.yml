name: Release Build

on:
  release:
    types: [created]

jobs:
  macos-package:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and package for macOS
        run: ./gradlew build packageMacOsDmg

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: CADas-macOS-dmg
          path: build/installer/macos/dmg/*
