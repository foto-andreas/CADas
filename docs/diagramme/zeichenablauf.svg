<svg xmlns="http://www.w3.org/2000/svg" width="920" height="920" viewBox="0 0 920 920" role="img" aria-labelledby="title desc">
  <title id="title">Zeichenablauf in CADas</title>
  <desc id="desc">Ablaufdiagramm für Wandzeichnen, automatische Raumableitung, Treppen, Öffnungen und Bearbeitung.</desc>
  <defs>
    <marker id="pfeil" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34506b"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #2f2a24; }
      .box { fill: #f5f1e8; stroke: #a99b88; stroke-width: 1.5; rx: 8; }
      .primary { fill: #e8f2ea; stroke: #4f7d61; stroke-width: 1.5; rx: 8; }
      .decision { fill: #e8eff5; stroke: #4b6a88; stroke-width: 1.5; rx: 8; }
      .arrow { stroke: #34506b; stroke-width: 2; fill: none; marker-end: url(#pfeil); }
      .label { font-size: 18px; font-weight: 650; }
      .hint { font-size: 14px; fill: #5c5146; }
      .edge { font-size: 13px; fill: #34506b; font-weight: 600; }
    </style>
  </defs>

  <rect width="920" height="920" fill="#ffffff"/>

  <rect class="box" x="330" y="28" width="260" height="58"/>
  <text class="label" x="460" y="63" text-anchor="middle">Zeichenvorgang starten</text>

  <rect class="decision" x="330" y="128" width="260" height="78"/>
  <text class="label" x="460" y="160" text-anchor="middle">Werkzeug wählen</text>
  <text class="hint" x="460" y="184" text-anchor="middle">aus Menü, Leiste oder Kürzel</text>

  <path class="arrow" d="M460 86 L460 124"/>

  <rect class="primary" x="70" y="286" width="300" height="72"/>
  <text class="label" x="220" y="315" text-anchor="middle">Wand</text>
  <text class="hint" x="220" y="338" text-anchor="middle">Snap, 90°-Modus, Vorschau</text>
  <path class="arrow" d="M390 206 C310 232, 250 248, 224 282"/>
  <text class="edge" x="300" y="246" text-anchor="middle">Wand</text>

  <rect class="box" x="70" y="398" width="300" height="82"/>
  <text class="label" x="220" y="429" text-anchor="middle">Wand speichern</text>
  <text class="hint" x="220" y="453" text-anchor="middle">Geschossmodell aktualisieren</text>
  <path class="arrow" d="M220 358 L220 394"/>

  <rect class="box" x="70" y="520" width="300" height="82"/>
  <text class="label" x="220" y="551" text-anchor="middle">Raumautomatik</text>
  <text class="hint" x="220" y="575" text-anchor="middle">geschlossene Wandzüge ableiten</text>
  <path class="arrow" d="M220 480 L220 516"/>

  <rect class="primary" x="550" y="286" width="300" height="72"/>
  <text class="label" x="700" y="315" text-anchor="middle">Treppe</text>
  <text class="hint" x="700" y="338" text-anchor="middle">Grundfläche aufziehen</text>
  <path class="arrow" d="M530 206 C610 232, 670 248, 696 282"/>
  <text class="edge" x="620" y="246" text-anchor="middle">Treppe</text>

  <rect class="box" x="550" y="398" width="300" height="82"/>
  <text class="label" x="700" y="429" text-anchor="middle">Treppe speichern</text>
  <text class="hint" x="700" y="453" text-anchor="middle">Preset, Höhe, Stufenanzahl</text>
  <path class="arrow" d="M700 358 L700 394"/>

  <rect class="primary" x="70" y="642" width="300" height="72"/>
  <text class="label" x="220" y="671" text-anchor="middle">Tür oder Fenster</text>
  <text class="hint" x="220" y="694" text-anchor="middle">auf vorhandene Wand klicken</text>
  <path class="arrow" d="M330 206 C130 280, 30 455, 180 638"/>

  <rect class="primary" x="550" y="642" width="300" height="72"/>
  <text class="label" x="700" y="671" text-anchor="middle">Bearbeiten</text>
  <text class="hint" x="700" y="694" text-anchor="middle">Wand, Raum, Öffnung oder Treppe wählen</text>
  <path class="arrow" d="M590 206 C790 280, 890 455, 740 638"/>
</svg>
